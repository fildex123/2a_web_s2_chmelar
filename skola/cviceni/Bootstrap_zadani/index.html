<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>

    <header class="container">
      <div class="row">
        <div class="">
          <h1 class="">Bootstrap layout</h1>
          <p class="text-muted">A tiny example page using Bootstrap's grid, flex utilities and spacing utilities — no components, just classes.</p>
          <p class="mb-0 small text-muted">Source: basic ideas from Bootstrap (grid, flexbox & utilities).</p>
        </div>
        <div class="">
          <div class="text-center">
            <img src="boot.jpg" alt="Bootstrap illustration">
          </div>
        </div>
      </div>
    </header>

    <section class="container py-4">
      <h2 class="h4 mb-3">Utilities</h2>

      <div class="row g-3">
        <div class="col-12 col-md-6">
          <div class="p-3 rounded bg-light">
            <p class="mb-2">Text utilities:</p>
            <p class="small">Left</p>
            <p class="small">Center</p>
            <p class="small">Right</p>
          </div>
        </div>

        <div class="col-12 col-md-6">
          <div class="p-3 rounded bg-light">
            <p class="mb-2">Display</p>
            <div class="mb-2">
              <div class="small">Left</div>
              <div class="small">Centered</div>
              <div class="small">Right</div>
            </div>
          </div>
        </div>
      </div>

    </section>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

  </body>
</html>
