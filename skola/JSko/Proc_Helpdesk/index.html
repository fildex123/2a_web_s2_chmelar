<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpdesk Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Interní Helpdesk Systém</h1>
        </header>
        
        <main class="grid-container">
            <section class="card form-section">
                <h2>Založení nového tiketu</h2>
                
                <div class="form-group">
                    <label for="client-name">Jméno klienta:</label>
                    <input type="text" id="client-name" placeholder="Např. Jan Novák">
                </div>
                
                <div class="form-group">
                    <label for="issue-desc">Popis problému (koncept se automaticky ukládá):</label>
                    <textarea id="issue-desc" rows="6" placeholder="Detailní popis zákaznického problému..."></textarea>
                </div>
                
                <button id="submit-ticket" class="btn-primary">Uložit tiket do systému</button>
            </section>

            <section class="card history-section">
                <h2>Vyřešené tikety</h2>
                <div id="ticket-list">
                    </div>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
